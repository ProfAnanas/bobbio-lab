<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portale verifiche - Norberto Bobbio</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 { color: #333; font-size: 24px; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
            text-transform: uppercase;
        }
        button {
            background-color: #0056b3;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }
        button:hover { background-color: #004494; }
        #messaggioErrore {
            color: #d9534f;
            margin-top: 15px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Accesso alle verifiche</h1>
        <p>Inserisci il codice ID fornito dal tuo insegnante.</p>
        
        <input type="text" id="codiceVerifica" placeholder="Es. PASTICC-5A" autocomplete="off">
        <button onclick="accediAllaVerifica()">Vai alla verifica</button>
        
        <p id="messaggioErrore">Codice non valido o non trovato. Riprova.</p>
    </div>

<script>
    function accediAllaVerifica() {
        const inputId = document.getElementById('codiceVerifica').value.trim().toUpperCase();
        const messaggioErrore = document.getElementById('messaggioErrore');
        
        if (!inputId) return;

        // Inseriamo le verifiche direttamente qui dentro!
        const database = {
            "TERZE-SOST": "https://forms.gle/4UpLep1iYbpZXdEd8",
            "GATTONERO26": "https://forms.gle/LINK_A_CASO"
        };

        if (database[inputId]) {
            window.location.href = database[inputId];
        } else {
            messaggioErrore.textContent = "Codice non valido o non trovato. Riprova.";
            messaggioErrore.style.display = 'block';
        }
    }
</script>

</body>
</html>
