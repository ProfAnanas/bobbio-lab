<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laboratorio di accoglienza</title>
    <link rel="stylesheet" href="css/style.css?v=2.5">
</head>
<body class="body-accoglienza"> 
    <header class="header-app">
        <h1>Accoglienza turistica</h1>
        <button class="tasto-app" onclick="window.location.href='index.html'">Torna all'hub</button>
    </header>

    <main class="contenitore-principale">
        <section id="pannello-controllo" style="display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 30px;">
            <input type="text" id="campo-ricerca" placeholder="Cerca procedura..." class="input-ricerca" style="flex-grow: 1; min-width: 200px;">
            <button class="tasto-app" onclick="window.location.href='glossario_accoglienza.html'" style="background-color: #d39e00; color: white; border: none; flex-grow: 1; display: flex; align-items: center; justify-content: center; gap: 8px;">
                📖 Glossario
            </button>
        </section>

        <div id="griglia-menu">
            <p style="text-align: center;">Caricamento procedure in corso...</p>
        </div>

        <div id="vista-ricetta" style="display: none;">
            <div class="intestazione-ricetta">
                <h2 id="titolo-ricetta-corrente">Nome procedura</h2>
                <div class="comandi-ricetta">
                    <button class="tasto-app tasto-secondario" onclick="chiudiAlgoritmo()">Torna alle procedure</button>
                </div>
            </div>

            <div id="plancia-doppia">
                <div id="pannello-ingredienti">
                    <h3>Frasi chiave (Il gobbo)</h3>
                    <ul id="lista-gobbo" class="lista-stile-gobbo"></ul>
                </div>

                <div id="pannello-testo">
                    <div id="lista-procedimento"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/accoglienza.js?v=2.4"></script>
</body>
</html>
